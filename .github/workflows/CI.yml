name: CI
on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - 'min'  # oldest version allowed by Project.toml compat (catches lower-bound breakage)
          - 'lts'  # current long-term-support release
          - '1'    # latest stable
#          - 'pre'
        os:
          - ubuntu-latest
          - windows-latest
        arch:
          - x64
        include:
          - os: macOS-latest
            arch: aarch64
            version: 1
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run tests with coverage
        uses: julia-actions/julia-runtest@v1
        with:
          coverage: true
        env:
          # Exercise the multithreaded code paths with an interactive thread present
          # (worker nthreads()==2, interactive thread id 1) — the layout that surfaced
          # the threadid() misuse on Julia 1.12.
          JULIA_NUM_THREADS: '2,1'
      - name: JET type-stability checks
        # JET targets Julia ≥ 1.12, so only run on the latest stable entry. Installed
        # ad hoc (like coverage below) to avoid constraining the test env resolve.
        if: matrix.version == '1' && matrix.os == 'ubuntu-latest'
        run: |
          julia --project=. -e '
            using Pkg; Pkg.add("JET")
            include("test/jet_tests.jl")
          '
        env:
          JULIA_NUM_THREADS: '2,1'
      - name: Process and upload coverage with Coverage.jl
        if: matrix.version == '1' && matrix.os == 'ubuntu-latest'
        run: |
          julia -e '
            using Pkg; Pkg.add("Coverage")
            using Coverage
            process_and_upload(service=:both, folder="src")
          '
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
